{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="text-center p-5 rounded-4 shadow bg-white border" style="max-width: 500px; width: 100%; border-color: #233d4d !important;">
        <i class="fas fa-robot fa-4x mb-4 fa-bounce" style="color: #fe7f2d;"></i>
        
        <div class="mb-4">
            <h1 id="progressPercentage" class="display-4 fw-bold" style="color: #fe7f2d;">25%</h1>
        </div>
        
        <h4 class="fw-bold mb-2" style="color: #233d4d;" id="statusTitle">ขั้นตอนที่ 1/4: กำลังค้นหาสินค้า</h4>
        <p class="text-muted mb-0" id="statusText">กำลังดึงข้อมูลสินค้าเบื้องต้นจากแพลตฟอร์ม...</p>
        
        <div class="mt-4 pt-3 border-top" style="border-color: #eaecf0 !important;">
            <small class="text-muted"><i class="fas fa-info-circle me-1"></i> คำค้นหาของคุณ: <strong>{{ history.keyword }}</strong></small>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const historyId = "{{ history.id }}";
        const titleEl = document.getElementById("statusTitle");
        const textEl = document.getElementById("statusText");
        const percentEl = document.getElementById("progressPercentage");

        // ฟังก์ชันสำหรับอัปเดตหน้าจอ
        function updateUI(percent, title, text) {
            percentEl.innerText = percent + "%";
            titleEl.innerText = title;
            textEl.innerText = text;
        }

        // ---------------------------------------------------------
        // ลำดับการทำงาน (Fake Load ผสม Real Status)
        // ---------------------------------------------------------

        // นาทีที่ 0: ขั้นที่ 1 - กำลังค้นหาสินค้า
        updateUI(25, "กำลังค้นหาสินค้า", "กำลังดึงข้อมูลสินค้าเบื้องต้นจากแพลตฟอร์ม...");

        // ผ่านไป 1 นาที (60,000 ms): ขั้นที่ 2 - AI กำลังคัดเลือก
        setTimeout(() => {
            updateUI(50, "กำลังคัดเลือก", "AI กำลังวิเคราะห์และคัดกรองสินค้าที่ดีที่สุด...");
        }, 60000);

        // ผ่านไป 2 นาที (120,000 ms): ขั้นที่ 3 - เริ่มรอระบบจริงทำงานเสร็จ
        setTimeout(() => {
            updateUI(75, "AI กำลังเรียงลำดับผล", "กำลังจัดอันดับและเตรียมข้อมูลเปรียบเทียบ (กำลังรอผลจากระบบ)...");
            
            // เริ่มยิง API เช็คสถานะจริงเมื่อถึงขั้นที่ 3
            const checkRealStatusInterval = setInterval(() => {
                fetch(`/api/check_status/${historyId}/`)
                    .then(response => response.json())
                    .then(data => {
                        const status = data.status;
                        
                        // ถ้าระบบจริงแจ้งว่าสำเร็จ (เข้าสู่ขั้นที่ 4)
                        if (status === 'success') {
                            clearInterval(checkRealStatusInterval); // หยุดเช็ค API
                            
                            updateUI(100, "เสร็จสมบูรณ์!", "กำลังพาท่านไปยังหน้าเลือกสินค้าเพื่อเปรียบเทียบ...");
                            percentEl.style.color = '#198754'; // เปลี่ยนสีตัวเลขเป็นสีเขียวเมื่อสำเร็จ
                            
                            // หน่วงเวลาให้ผู้ใช้เห็นข้อความเสร็จสิ้น 1.5 วินาที ก่อนเด้งไปหน้าอื่น
                            setTimeout(() => {
                                window.location.href = `/select-compare/${historyId}/`; 
                            }, 1500);
                        } 
                        // ถ้าระบบจริงเกิด Error
                        else if (status === 'error') {
                            clearInterval(checkRealStatusInterval); // หยุดเช็ค API
                            
                            updateUI(100, "เกิดข้อผิดพลาด", "ไม่สามารถประมวลผลข้อมูลได้ กรุณาลองใหม่อีกครั้ง");
                            titleEl.classList.add("text-danger");
                            percentEl.style.color = '#e63946'; // เปลี่ยนสีตัวเลขเป็นสีแดงเมื่อเกิดข้อผิดพลาด
                        }
                    })
                    .catch(error => console.error('Error fetching status:', error));
            }, 2000); // เช็คหลังบ้านทุกๆ 2 วินาที

        }, 120000);
    });
</script>
{% endblock %}
